<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Architect of Cosmic Destiny — Srikanth Chintala</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --void: #07041a;
    --midnight: #0d0826;
    --indigo: #1a1247;
    --purple: #4a2d7f;
    --violet: #6b3fa0;
    --gold: #d4af37;
    --gold-bright: #f4d03f;
    --gold-soft: #b8860b;
    --champagne: #e8d5a0;
    --rose: #c47b9c;
    --ivory: #f5f0e1;
    --crimson: #8b1538;
    --shadow: 0 10px 40px rgba(0,0,0,0.5);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--void);
    color: var(--ivory);
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
  }
  /* === COSMIC BACKGROUND === */
  .cosmos {
    position: fixed; inset: 0; z-index: -2;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(107,63,160,0.35) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(74,45,127,0.4) 0%, transparent 55%),
      radial-gradient(ellipse at 50% 50%, rgba(26,18,71,0.6) 0%, transparent 70%),
      linear-gradient(180deg, #07041a 0%, #0d0826 50%, #07041a 100%);
  }
  .stars, .stars2, .stars3 {
    position: fixed; inset: 0; z-index: -1; pointer-events: none;
  }
  .stars  { background-image: radial-gradient(1px 1px at 25% 30%, #fff, transparent),
                            radial-gradient(1px 1px at 70% 80%, #fff, transparent),
                            radial-gradient(2px 2px at 40% 60%, #f4d03f, transparent),
                            radial-gradient(1px 1px at 90% 20%, #fff, transparent),
                            radial-gradient(1px 1px at 15% 85%, #c47b9c, transparent);
            background-size: 300px 300px; animation: twinkle 6s ease-in-out infinite alternate; }
  .stars2 { background-image: radial-gradient(1px 1px at 60% 15%, #fff, transparent),
                            radial-gradient(2px 2px at 30% 70%, #d4af37, transparent),
                            radial-gradient(1px 1px at 80% 50%, #fff, transparent);
            background-size: 500px 500px; animation: twinkle 9s ease-in-out infinite alternate-reverse; }
  .stars3 { background-image: radial-gradient(1.5px 1.5px at 10% 40%, #f4d03f, transparent),
                            radial-gradient(1px 1px at 55% 90%, #fff, transparent);
            background-size: 700px 700px; animation: twinkle 12s ease-in-out infinite alternate; }
  @keyframes twinkle {
    0%, 100% { opacity: 0.4; }
    50%      { opacity: 1; }
  }
  /* === ROTATING MANDALA === */
  .mandala {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 1200px; height: 1200px; z-index: -1; opacity: 0.05;
    animation: rotate 180s linear infinite;
    pointer-events: none;
  }
  @keyframes rotate { to { transform: translate(-50%, -50%) rotate(360deg); } }

  /* === LAYOUT === */
  .app { max-width: 1280px; margin: 0 auto; padding: 40px 24px 80px; }

  /* === HEADER === */
  .hero {
    text-align: center; padding: 40px 20px 60px;
    position: relative;
  }
  .hero::before {
    content: '✦'; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    color: var(--gold); font-size: 24px; animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 0.5; transform: translateX(-50%) scale(1); }
    50%     { opacity: 1; transform: translateX(-50%) scale(1.3); text-shadow: 0 0 20px var(--gold); }
  }
  .hero-eyebrow {
    font-family: 'Cinzel', serif; letter-spacing: 0.4em; font-size: 11px;
    color: var(--gold); text-transform: uppercase; margin-bottom: 16px;
  }
  .hero-title {
    font-family: 'Cinzel', serif; font-weight: 600;
    font-size: clamp(36px, 6vw, 64px);
    background: linear-gradient(135deg, #f4d03f 0%, #d4af37 30%, #e8d5a0 60%, #d4af37 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    line-height: 1.1; margin-bottom: 16px;
    text-shadow: 0 0 60px rgba(212,175,55,0.3);
  }
  .hero-sub {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: clamp(16px, 2vw, 22px); color: var(--champagne); opacity: 0.85;
    max-width: 720px; margin: 0 auto;
  }
  .hero-meta {
    margin-top: 32px; display: flex; justify-content: center; gap: 32px; flex-wrap: wrap;
    font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 0.2em; color: var(--gold-soft);
  }
  .hero-meta span { padding: 8px 16px; border: 1px solid rgba(212,175,55,0.3); border-radius: 2px; background: rgba(13,8,38,0.5); }

  /* === TABS === */
  .tabs {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 4px;
    margin: 40px 0 32px; padding: 8px;
    background: linear-gradient(135deg, rgba(74,45,127,0.2), rgba(26,18,71,0.4));
    border: 1px solid rgba(212,175,55,0.2); border-radius: 4px;
    backdrop-filter: blur(10px);
  }
  .tab {
    flex: 1; min-width: 140px;
    padding: 14px 18px; border: none; background: transparent; cursor: pointer;
    font-family: 'Cinzel', serif; letter-spacing: 0.18em; font-size: 11px; text-transform: uppercase;
    color: var(--champagne); opacity: 0.6; transition: all 0.4s ease; border-radius: 2px;
    position: relative;
  }
  .tab:hover { opacity: 1; color: var(--gold-bright); }
  .tab.active {
    opacity: 1; color: #07041a;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-bright) 50%, var(--gold) 100%);
    box-shadow: 0 0 30px rgba(212,175,55,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
    font-weight: 600;
  }

  /* === CARDS === */
  .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 20px; }
  .card {
    background: linear-gradient(135deg, rgba(26,18,71,0.6) 0%, rgba(13,8,38,0.8) 100%);
    border: 1px solid rgba(212,175,55,0.2);
    border-radius: 4px; padding: 28px;
    backdrop-filter: blur(10px);
    box-shadow: var(--shadow);
    position: relative; overflow: hidden;
    transition: border-color 0.4s, transform 0.4s;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .card:hover { border-color: rgba(212,175,55,0.5); }
  .card-eyebrow {
    font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 0.3em;
    color: var(--gold); text-transform: uppercase; margin-bottom: 8px;
  }
  .card-title {
    font-family: 'Cormorant Garamond', serif; font-weight: 600;
    font-size: 26px; color: var(--ivory); margin-bottom: 16px;
    line-height: 1.2;
  }
  .card p, .card li {
    font-family: 'Inter', sans-serif; font-weight: 300; line-height: 1.75;
    color: rgba(245,240,225,0.85); font-size: 15px;
  }
  .card p + p { margin-top: 12px; }
  .card ul { margin: 12px 0 0 0; padding-left: 20px; }
  .card li { margin-bottom: 10px; }
  .card li::marker { color: var(--gold); }
  .col-12 { grid-column: span 12; }
  .col-8  { grid-column: span 8; }
  .col-6  { grid-column: span 6; }
  .col-4  { grid-column: span 4; }
  @media (max-width: 900px) {
    .col-8, .col-6, .col-4 { grid-column: span 12; }
  }

  /* === ACCENTS === */
  .accent { color: var(--gold-bright); font-weight: 500; }
  .rose   { color: var(--rose); font-style: italic; }
  .truth  { color: #ff6b6b; font-weight: 500; }
  .strength { color: #6bd49b; font-weight: 500; }

  .divider {
    text-align: center; margin: 24px 0; color: var(--gold); opacity: 0.4;
    letter-spacing: 1em; font-size: 12px;
  }

  /* === KUNDALI CHART === */
  .chart-wrap {
    display: flex; justify-content: center; align-items: center;
    padding: 20px;
  }
  .kundali { width: 100%; max-width: 500px; aspect-ratio: 1; }
  .kundali line { stroke: var(--gold); stroke-width: 1.5; opacity: 0.7; }
  .kundali .frame { stroke: var(--gold-bright); stroke-width: 2.5; opacity: 0.9; fill: rgba(13,8,38,0.4); }
  .kundali text.house-num { fill: var(--gold-soft); font-family: 'Cinzel',serif; font-size: 11px; font-weight: 500; opacity: 0.7; }
  .kundali text.planet    { fill: var(--gold-bright); font-family: 'Cinzel',serif; font-weight: 600; font-size: 13px; }
  .kundali text.lagna-mark{ fill: #ff6b6b; font-family: 'Cinzel',serif; font-size: 10px; font-weight: 700; }
  .kundali text.deb { fill: #ff8b8b; }
  .kundali text.exa { fill: #6bd49b; }

  /* === DATA TABLE === */
  .data-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
  .data-table th, .data-table td {
    padding: 10px 12px; text-align: left; border-bottom: 1px solid rgba(212,175,55,0.15);
    font-size: 13px;
  }
  .data-table th {
    font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 0.2em;
    color: var(--gold); text-transform: uppercase; font-weight: 500;
  }
  .data-table td { color: rgba(245,240,225,0.85); }
  .data-table tr:hover td { background: rgba(212,175,55,0.05); }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 2px;
    font-size: 10px; font-family: 'Cinzel',serif; letter-spacing: 0.1em;
    background: rgba(212,175,55,0.15); color: var(--gold-bright); margin-left: 6px;
  }
  .badge.deb { background: rgba(255,107,107,0.15); color: #ff8b8b; }
  .badge.exa { background: rgba(107,212,155,0.15); color: #6bd49b; }
  .badge.own { background: rgba(196,123,156,0.15); color: var(--rose); }

  /* === DASHA TIMELINE === */
  .dasha-bar {
    height: 8px; background: rgba(74,45,127,0.3); border-radius: 4px;
    position: relative; margin: 12px 0 24px; overflow: hidden;
  }
  .dasha-fill {
    position: absolute; top: 0; left: 0; height: 100%;
    background: linear-gradient(90deg, var(--purple), var(--gold));
    border-radius: 4px;
    box-shadow: 0 0 20px rgba(212,175,55,0.4);
  }
  .dasha-list { list-style: none; padding: 0; }
  .dasha-list li {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 14px; margin-bottom: 6px;
    background: rgba(74,45,127,0.15); border-left: 2px solid rgba(212,175,55,0.2);
    border-radius: 2px; font-size: 13px;
  }
  .dasha-list li.current {
    background: linear-gradient(90deg, rgba(212,175,55,0.2), rgba(74,45,127,0.2));
    border-left: 2px solid var(--gold-bright);
    box-shadow: 0 0 20px rgba(212,175,55,0.15);
  }
  .dasha-list li .name { font-family: 'Cinzel', serif; letter-spacing: 0.1em; color: var(--champagne); }
  .dasha-list li .period { color: var(--gold-soft); font-size: 12px; }

  /* === REMEDY BLOCKS === */
  .remedy {
    padding: 18px 20px; background: rgba(74,45,127,0.15);
    border-left: 3px solid var(--gold); border-radius: 2px; margin-bottom: 14px;
  }
  .remedy-title { font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 0.2em; color: var(--gold-bright); margin-bottom: 8px; }
  .mantra {
    font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 17px;
    color: var(--champagne); padding: 10px 0; border-top: 1px dashed rgba(212,175,55,0.2);
    border-bottom: 1px dashed rgba(212,175,55,0.2); margin: 10px 0;
  }

  /* === KEY METRIC === */
  .metric {
    text-align: center; padding: 24px 12px;
    background: linear-gradient(135deg, rgba(74,45,127,0.25), rgba(13,8,38,0.5));
    border: 1px solid rgba(212,175,55,0.25); border-radius: 4px;
  }
  .metric-value {
    font-family: 'Cinzel', serif; font-size: 28px; font-weight: 600;
    background: linear-gradient(135deg, var(--gold-bright), var(--gold));
    -webkit-background-clip: text; background-clip: text; color: transparent;
    margin-bottom: 6px;
  }
  .metric-label {
    font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.3em;
    color: var(--gold-soft); text-transform: uppercase;
  }

  /* === FOOTER === */
  footer {
    text-align: center; padding: 60px 20px 0;
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    color: var(--gold-soft); opacity: 0.7; font-size: 14px;
  }
  footer .om { font-size: 32px; color: var(--gold); display: block; margin-bottom: 12px;
               text-shadow: 0 0 20px rgba(212,175,55,0.5);
               animation: pulse 4s ease-in-out infinite; }

  /* === SCROLLBAR === */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--midnight); }
  ::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--gold-soft); }
</style>
</head>
<body>
<div class="cosmos"></div>
<div class="stars"></div>
<div class="stars2"></div>
<div class="stars3"></div>
<svg class="mandala" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <g fill="none" stroke="#d4af37" stroke-width="0.3">
    <circle cx="100" cy="100" r="90"/>
    <circle cx="100" cy="100" r="75"/>
    <circle cx="100" cy="100" r="60"/>
    <circle cx="100" cy="100" r="45"/>
    <circle cx="100" cy="100" r="30"/>
    <circle cx="100" cy="100" r="15"/>
  </g>
  <g fill="none" stroke="#d4af37" stroke-width="0.2" transform="translate(100,100)">
    <g><line x1="0" y1="-90" x2="0" y2="90"/><line x1="-90" y1="0" x2="90" y2="0"/></g>
    <g transform="rotate(30)"><line x1="0" y1="-90" x2="0" y2="90"/></g>
    <g transform="rotate(60)"><line x1="0" y1="-90" x2="0" y2="90"/></g>
    <g transform="rotate(120)"><line x1="0" y1="-90" x2="0" y2="90"/></g>
    <g transform="rotate(150)"><line x1="0" y1="-90" x2="0" y2="90"/></g>
    <g transform="rotate(45)"><line x1="0" y1="-90" x2="0" y2="90"/></g>
    <g transform="rotate(15)"><line x1="0" y1="-90" x2="0" y2="90"/></g>
    <g transform="rotate(75)"><line x1="0" y1="-90" x2="0" y2="90"/></g>
  </g>
  <g fill="#d4af37" opacity="0.4">
    <circle cx="100" cy="10" r="1.5"/>
    <circle cx="100" cy="190" r="1.5"/>
    <circle cx="10" cy="100" r="1.5"/>
    <circle cx="190" cy="100" r="1.5"/>
  </g>
</svg>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

/* ====== CHART DATA ====== */
const NATIVE = {
  name: "Srikanth Chintala",
  date: "19 April 1997",
  time: "05:05 AM IST",
  place: "Endapalli, Velgatoor, Karimnagar, Telangana"
};

// Houses 1..12 with planets. Pisces Lagna means H1=Pisces, H2=Aries, ... H7=Virgo, H11=Capricorn
const HOUSES = {
  1:  { sign: "Pisces",      planets: ["Lg", "Ve(E)", "Ma", "Sa", "Ke"] },
  2:  { sign: "Aries",       planets: ["Su", "Me"] },
  3:  { sign: "Taurus",      planets: [] },
  4:  { sign: "Gemini",      planets: [] },
  5:  { sign: "Cancer",      planets: [] },
  6:  { sign: "Leo",         planets: [] },
  7:  { sign: "Virgo",       planets: ["Mo", "Ra"] },
  8:  { sign: "Libra",       planets: [] },
  9:  { sign: "Scorpio",     planets: [] },
  10: { sign: "Sagittarius", planets: [] },
  11: { sign: "Capricorn",   planets: ["Ju(D)"] },
  12: { sign: "Aquarius",    planets: [] }
};

const PLANETS = [
  { name: "Lagna",   sign: "Pisces (Meena)",   deg: "25°12'", nak: "Revati",          pada: 4, lord: "Mercury", note: "Final degree of zodiac — soul of completion" },
  { name: "Sun",     sign: "Aries (Mesha)",    deg: "5°02'",  nak: "Ashwini",         pada: 2, lord: "Ketu",    note: "Healer of the cosmos · Combust intensity" },
  { name: "Moon",    sign: "Virgo (Kanya)",    deg: "8°20'",  nak: "Uttara Phalguni", pada: 4, lord: "Sun",     note: "Royal patronage · with Rahu = restless mind" },
  { name: "Mars",    sign: "Pisces",           deg: "21°08'", nak: "Revati",          pada: 4, lord: "Mercury", note: "Friendly · gives vision-driven action" },
  { name: "Mercury", sign: "Aries",            deg: "17°44'", nak: "Bharani",         pada: 2, lord: "Venus",   note: "Combust — burns the analytical edge" },
  { name: "Jupiter", sign: "Capricorn",        deg: "3°16'",  nak: "Uttara Ashadha",  pada: 1, lord: "Sun",     note: "DEBILITATED — Neecha · 11H gain bhanga" , flag:"deb"},
  { name: "Venus",   sign: "Pisces",           deg: "24°50'", nak: "Revati",          pada: 4, lord: "Mercury", note: "EXALTED — Param Uchcha in Lagna · Diamond of chart", flag:"exa" },
  { name: "Saturn",  sign: "Pisces",           deg: "21°42'", nak: "Revati",          pada: 4, lord: "Mercury", note: "Karmic anchor on the body & ego" },
  { name: "Rahu",    sign: "Virgo",            deg: "0°15'",  nak: "Uttara Phalguni", pada: 2, lord: "Sun",     note: "Hunger for partnership/foreign · with Moon" },
  { name: "Ketu",    sign: "Pisces",           deg: "0°15'",  nak: "Revati",          pada: 1, lord: "Mercury", note: "Past-life moksha karma in Lagna" }
];

const DASHA = [
  { lord: "Sun",     start: "1997 Apr", end: "1997 Sep", years: 0.5 },
  { lord: "Moon",    start: "1997 Sep", end: "2007 Sep", years: 10  },
  { lord: "Mars",    start: "2007 Sep", end: "2014 Sep", years: 7   },
  { lord: "Rahu",    start: "2014 Sep", end: "2032 Sep", years: 18, current: true },
  { lord: "Jupiter", start: "2032 Sep", end: "2048 Sep", years: 16  },
  { lord: "Saturn",  start: "2048 Sep", end: "2067 Sep", years: 19  }
];

const ANTAR = [
  { lord: "Rahu",    start: "2014 Sep", end: "2017 Jun" },
  { lord: "Jupiter", start: "2017 Jun", end: "2019 Nov" },
  { lord: "Saturn",  start: "2019 Nov", end: "2022 Sep" },
  { lord: "Mercury", start: "2022 Sep", end: "2025 Apr" },
  { lord: "Ketu",    start: "2025 Apr", end: "2026 Apr" },
  { lord: "Venus",   start: "2026 Apr", end: "2029 Apr", current: true },
  { lord: "Sun",     start: "2029 Apr", end: "2030 Mar" },
  { lord: "Moon",    start: "2030 Mar", end: "2031 Sep" },
  { lord: "Mars",    start: "2031 Sep", end: "2032 Sep" }
];

/* ====== NORTH-INDIAN KUNDALI SVG ======
   Standard layout: diamond inside square. Lagna is fixed top-center diamond.
   House positions (centroids approx) for placing planet text. */
function Kundali() {
  // SVG viewBox 400x400
  // Vertices of outer square: (0,0)(400,0)(400,400)(0,400)
  // Mid-points: (200,0)(400,200)(200,400)(0,200)
  // Inner diamond: top(200,0) right(400,200) bottom(200,400) left(0,200)
  // Diagonals: (0,0)-(400,400) and (400,0)-(0,400) intersect at (200,200)
  const cells = [
    // [houseNum, cx, cy]
    [1, 200,  90],   // top diamond center
    [2, 100,  50],
    [3,  50, 100],
    [4, 100, 200],
    [5,  50, 300],
    [6, 100, 350],
    [7, 200, 310],
    [8, 300, 350],
    [9, 350, 300],
    [10,300, 200],
    [11,350, 100],
    [12,300,  50]
  ];
  return (
    <svg className="kundali" viewBox="0 0 400 400">
      <defs>
        <radialGradient id="chartGlow" cx="50%" cy="50%" r="60%">
          <stop offset="0%"  stopColor="rgba(107,63,160,0.25)"/>
          <stop offset="100%" stopColor="rgba(13,8,38,0)"/>
        </radialGradient>
      </defs>
      <rect x="0" y="0" width="400" height="400" fill="url(#chartGlow)"/>
      {/* outer frame */}
      <rect className="frame" x="2" y="2" width="396" height="396"/>
      {/* diamond */}
      <polygon className="frame" points="200,2 398,200 200,398 2,200"/>
      {/* diagonals */}
      <line x1="2" y1="2" x2="398" y2="398"/>
      <line x1="398" y1="2" x2="2" y2="398"/>

      {cells.map(([h, cx, cy]) => {
        const data = HOUSES[h];
        return (
          <g key={h}>
            <text className="house-num" x={cx - 36} y={cy - 30}>{h}</text>
            {data.planets.map((p, i) => {
              const isLg = p === "Lg";
              const isExa = p.includes("(E)");
              const isDeb = p.includes("(D)");
              const cls = isLg ? "lagna-mark" : (isExa ? "planet exa" : (isDeb ? "planet deb" : "planet"));
              const display = p.replace("(E)","").replace("(D)","");
              return (
                <text key={i} className={cls} x={cx} y={cy - 6 + i * 16} textAnchor="middle">

            <div className="remedy-title">Remedy V · For Ketu in Lagna (the moksha thread)</div>
            <p>This is not a correction — Ketu in Lagna is a gift of detachment. Honor it:</p>
            <ul>
              <li>Visit a Ganesha temple on the 4th of every month.</li>
              <li>Keep a small section of your room minimal — almost empty. Ketu lives there.</li>
              <li>Once a year, take a 3-day silent retreat. Mountains preferred.</li>
              <li>Mantra (only when seeking clarity): <em>Om Ketave Namah</em> — 108 repetitions.</li>
            </ul>
          </div>

          <div className="divider">✧ ✦ ✧</div>

          <p style={{textAlign:"center", fontFamily:"'Cormorant Garamond',serif", fontStyle:"italic", color:"var(--champagne)", fontSize:"18px", padding:"12px 24px"}}>
            "The chart shows the wind. You are still the sailor.<br/>
            Remedies are not prayers for change — they are the rudder you choose to hold."
          </p>
        </div>
      </div>
    </div>
  );
}

/* ====== APP SHELL ====== */
function App() {
  const [tab, setTab] = useState("overview");
  const tabs = [
    { id: "overview", label: "Overview" },
    { id: "career",   label: "Career & Karma" },
    { id: "love",     label: "Love & Union" },
    { id: "health",   label: "Health & Vitality" },
    { id: "wealth",   label: "Wealth · Artha" }
  ];

  useEffect(() => {
    document.documentElement.scrollTo({ top: 0, behavior: "smooth" });
  }, [tab]);

  return (
    <div className="app">
      <header className="hero">
        <div className="hero-eyebrow">Architect of Cosmic Destiny</div>
        <h1 className="hero-title">{NATIVE.name}</h1>
        <p className="hero-sub">A multi-dimensional Vedic Kundali · woven from the night sky on the dawn of {NATIVE.date}, at the very threshold between {NATIVE.time.replace(" IST"," ")} and the rising sun over {NATIVE.place.split(",")[0]}.</p>
        <div className="hero-meta">
          <span>◆ {NATIVE.date}</span>
          <span>◆ {NATIVE.time}</span>
          <span>◆ {NATIVE.place}</span>
          <span>◆ Pisces Lagna · Revati</span>
        </div>
      </header>

      <nav className="tabs">
        {tabs.map(t => (
          <button key={t.id} className={"tab " + (tab===t.id ? "active" : "")} onClick={() => setTab(t.id)}>
            {t.label}
          </button>
        ))}
      </nav>

      <main>
        {tab === "overview" && <Overview/>}
        {tab === "career"   && <CareerKarma/>}
        {tab === "love"     && <LoveUnion/>}
        {tab === "health"   && <HealthVitality/>}
        {tab === "wealth"   && <WealthArtha/>}
      </main>

      <footer>
        <span className="om">ॐ</span>
        Crafted with the discipline of Saturn, the grace of Venus, and the compass of Pushan.<br/>
        <em>May your dharma walk you home.</em>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
